<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Web Anggaran Ditbinmas Polda Aceh</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a4fa0;--blue-dark:#0f3270;--blue-light:#e8f0fb;--blue-mid:#2e6be6;
  --white:#fff;--gray-50:#f7f8fa;--gray-100:#eef0f4;--gray-200:#dde1ea;
  --gray-400:#8b95a8;--gray-600:#5a6272;--gray-700:#3d4659;--gray-900:#1a2035;
  --green:#166534;--green-bg:#dcfce7;
  --red:#991b1b;--red-bg:#fef2f2;--red-border:#fca5a5;
  --font:'Plus Jakarta Sans',sans-serif;--radius:6px;--radius-lg:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
}
body{font-family:var(--font);background:var(--gray-50);color:var(--gray-900);font-size:14px;min-height:100vh;display:flex;align-items:center;justify-content:center}

/* LOADING OVERLAY */
#loading-overlay{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px}
#loading-overlay.hide{display:none}
.spin{width:36px;height:36px;border:3px solid var(--gray-200);border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:13px;color:var(--gray-400);font-weight:500}

/* LOGIN BOX */
.lbox{background:var(--white);border:1px solid var(--gray-200);border-radius:var(--radius-lg);padding:36px 40px;width:400px;max-width:95vw;box-shadow:var(--shadow)}
.llogo{display:flex;align-items:center;gap:12px;margin-bottom:6px}
.lemblem{width:44px;height:44px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.llogo h1{font-size:15px;font-weight:700;color:var(--blue-dark);line-height:1.3}
.llogo p{font-size:11px;color:var(--gray-400);margin-top:1px}
.lmotto{font-size:11.5px;color:var(--gray-600);font-style:italic;border-left:3px solid var(--blue);padding-left:10px;margin:16px 0 24px;line-height:1.5}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray-700);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.fg input,.fg select{width:100%;padding:10px 12px;border:1px solid var(--gray-200);border-radius:var(--radius);font-family:var(--font);font-size:14px;color:var(--gray-900);background:var(--white);outline:none;transition:border-color .15s;-webkit-appearance:none}
.fg input:focus,.fg select:focus{border-color:var(--blue-mid);box-shadow:0 0 0 3px rgba(46,107,230,.1)}
.sel-wrap{position:relative}
.sel-wrap::after{content:'▾';position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--gray-400);pointer-events:none;font-size:12px}
.btn-login{width:100%;padding:11px;background:var(--blue);color:var(--white);border:none;border-radius:var(--radius);font-family:var(--font);font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;margin-top:4px;letter-spacing:.2px}
.btn-login:hover{background:var(--blue-dark)}
.btn-login:disabled{background:var(--gray-400);cursor:not-allowed}
.btn-login:active{transform:translateY(1px)}
.lerr{background:var(--red-bg);border:1px solid var(--red-border);border-radius:var(--radius);padding:10px 12px;color:var(--red);font-size:13px;margin-bottom:14px;display:none}
</style>
</head>
<body>

<div id="loading-overlay">
  <div class="spin"></div>
  <div class="loading-txt">Memverifikasi...</div>
</div>

<div class="lbox">
  <div class="llogo">
    <div class="lemblem">
      <img src="logo.png" alt="Logo" style="width:48px;height:50px;object-fit:contain">
    </div>
    <div>
      <h1>Web Anggaran Ditbinmas<br>Polda Aceh</h1>
      <p>RPD Satker T.A. 2026</p>
    </div>
  </div>
  <div class="lmotto">Humanis dan Ketulusan adalah Nafas Kami</div>
  <div class="lerr" id="lerr"></div>
  <div class="fg">
    <label>Kelompok User</label>
    <div class="sel-wrap">
      <select id="role-select">
        <option value="">— Pilih Kelompok User —</option>
        <option value="admin">Operator Perencanaan Renmin</option>
        <option value="binopsnal">BABINOPSNAL</option>
        <option value="satpam">Subdit SATPAM</option>
        <option value="bintibsos">Subdit BINTIBSOS</option>
        <option value="bhabin">Subdit BHABIN</option>
        <option value="binpolmas">Subdit BINPOLMAS</option>
      </select>
    </div>
  </div>
  <div class="fg">
    <label>Username</label>
    <input type="text" id="lu" placeholder="Username" autocomplete="off">
  </div>
  <div class="fg">
    <label>Password</label>
    <input type="password" id="lp" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
  </div>
  <button class="btn-login" id="btn-login" onclick="doLogin()">Masuk</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC35_mFGhX9A06O_YEP2l4ucTRcDb8rKP8",
  authDomain: "binmas-e8161.firebaseapp.com",
  projectId: "binmas-e8161",
  storageBucket: "binmas-e8161.firebasestorage.app",
  messagingSenderId: "583346597588",
  appId: "1:583346597588:web:864f1f7d88dae6b3601541"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Hash utility
async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Simpan accounts di session untuk cek login (hanya minimal data)
let accountsCache = {};

// Load hanya collection accounts — data lain TIDAK di-load sebelum login
async function loadAccounts(){
  try {
    const snap = await getDocs(collection(db, 'accounts'));
    snap.forEach(d => { accountsCache[d.id] = d.data(); });
  } catch(e) {
    console.error('Gagal load accounts:', e);
    throw e;
  }
}

async function doLogin(){
  const role = document.getElementById('role-select').value;
  const user = document.getElementById('lu').value.trim();
  const pass = document.getElementById('lp').value.trim();
  const err  = document.getElementById('lerr');
  err.style.display = 'none';

  if(!role){ showErr('Pilih kelompok user terlebih dahulu.'); return; }
  if(!user||!pass){ showErr('Username dan password tidak boleh kosong.'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Memeriksa...';

  try {
    const acc = accountsCache[role];
    const hashed = await sha256(pass);

    if(!acc || user !== acc.username || hashed !== acc.password){
      showErr('Username atau password salah.');
      btn.disabled = false; btn.textContent = 'Masuk'; return;
    }

    // Login berhasil — simpan sesi di sessionStorage lalu redirect
    btn.textContent = 'Berhasil, mengalihkan...';
    const sessionData = {
      role,
      key: role,
      ts: Date.now()
    };
    sessionStorage.setItem('wb_session', JSON.stringify(sessionData));
    window.location.href = 'dashboard.html';

  } catch(e) {
    showErr('Gagal terhubung ke server.');
    btn.disabled = false; btn.textContent = 'Masuk';
  }
}
window.doLogin = doLogin;

function showErr(msg){
  const e = document.getElementById('lerr');
  e.textContent = msg; e.style.display = 'block';
}

// Cek apakah sudah login → langsung redirect
const existing = sessionStorage.getItem('wb_session');
if(existing){
  try {
    const s = JSON.parse(existing);
    // Sesi valid max 8 jam
    if(s.ts && (Date.now() - s.ts) < 8 * 60 * 60 * 1000){
      window.location.href = 'dashboard.html';
    } else {
      sessionStorage.removeItem('wb_session');
    }
  } catch(e){ sessionStorage.removeItem('wb_session'); }
}

// Init: load accounts dulu, baru tampilkan form
(async()=>{
  try {
    await loadAccounts();
  } catch(e) {
    showErr('Gagal terhubung ke server. Coba muat ulang halaman.');
  }
  document.getElementById('loading-overlay').classList.add('hide');
})();
</script>
</body>
</html>
